name: Fork Transport Release

on:
  push:
    tags:
      - 'v*-oss'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Fork release tag to release, for example v1.5.2-oss'
        required: false
        type: string
      upstream_tag:
        description: 'Source upstream transports/v* tag'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: fork-transport-release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.meta.outputs.ref }}
      fork_tag: ${{ steps.meta.outputs.fork_tag }}
      fork_version: ${{ steps.meta.outputs.fork_version }}
      upstream_repo: ${{ steps.meta.outputs.upstream_repo }}
      upstream_tag: ${{ steps.meta.outputs.upstream_tag }}
      workflow_ref: ${{ steps.meta.outputs.workflow_ref }}
      ghcr_registry: ${{ steps.meta.outputs.ghcr_registry }}
      ghcr_image_ref: ${{ steps.meta.outputs.ghcr_image_ref }}
    env:
      REPOSITORY_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      GHCR_IMAGE_NAME: ${{ vars.GHCR_IMAGE_NAME }}
      GHCR_REGISTRY: ${{ vars.GHCR_REGISTRY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve release metadata
        id: meta
        run: |
          set -euo pipefail
          source ./.github/workflows/scripts/fork-workflow-config.sh
          source ./.github/workflows/scripts/fork-sync-state.sh

          fork_set_workflow_defaults

          REF="${{ inputs.tag }}"
          if [[ -z "$REF" && "${GITHUB_REF_TYPE:-}" == "tag" && -n "${GITHUB_REF_NAME:-}" ]]; then
            REF="${GITHUB_REF_NAME}"
          fi
          if [[ -z "$REF" ]]; then
            echo "Fork Transport Release requires an explicit fork release tag. Use Fork Docker Publish for dev builds from ${PATCH_BRANCH}." >&2
            exit 1
          fi

          UPSTREAM_TAG="${{ inputs.upstream_tag }}"
          if [[ -z "$UPSTREAM_TAG" ]]; then
            UPSTREAM_TAG="$(fork_upstream_tag_from_fork_tag "$REF")"
          fi
          if [[ -z "$UPSTREAM_TAG" ]]; then
            echo "Unable to resolve source upstream tag for ${REF}" >&2
            exit 1
          fi

          FORK_VERSION="$(fork_transport_version_from_tag "$REF")"
          GHCR_IMAGE_REF="${GHCR_REGISTRY}/${GHCR_IMAGE_NAME}"
          WORKFLOW_REF="${PATCH_BRANCH}"
          if [[ "${GITHUB_EVENT_NAME:-}" == "workflow_dispatch" && -n "${GITHUB_REF_NAME:-}" ]]; then
            WORKFLOW_REF="${GITHUB_REF_NAME}"
          fi

          {
            echo "ref=${REF}"
            echo "fork_tag=${REF}"
            echo "fork_version=${FORK_VERSION}"
            echo "upstream_repo=${UPSTREAM_REPO}"
            echo "upstream_tag=${UPSTREAM_TAG}"
            echo "workflow_ref=${WORKFLOW_REF}"
            echo "ghcr_registry=${GHCR_REGISTRY}"
            echo "ghcr_image_ref=${GHCR_IMAGE_REF}"
          } >> "$GITHUB_OUTPUT"

  build-ui:
    needs: [prepare]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'

      - name: Build UI
        run: make build-ui

      - name: Upload UI build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fork-transport-ui
          path: transports/bifrost-http/ui/
          if-no-files-found: error

  build-binaries:
    needs: [prepare, build-ui]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            goos: linux
            goarch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
          - platform: windows/amd64
            runner: windows-2025
            goos: windows
            goarch: amd64
          - platform: windows/arm64
            runner: windows-11-arm
            goos: windows
            goarch: arm64
          - platform: darwin/amd64
            runner: macos-15-intel
            goos: darwin
            goarch: amd64
          - platform: darwin/arm64
            runner: macos-15
            goos: darwin
            goarch: arm64
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          fetch-depth: 0

      - name: Checkout fork automation branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.workflow_ref }}
          path: _workflow

      - name: Overlay fork maintenance scripts
        run: |
          rm -rf .github/workflows/scripts
          mkdir -p .github/workflows
          cp -R _workflow/.github/workflows/scripts .github/workflows/scripts

      - name: Restore built UI
        run: |
          rm -rf transports/bifrost-http/ui
          mkdir -p transports/bifrost-http/ui

      - name: Download UI build artifact
        uses: actions/download-artifact@v4
        with:
          name: fork-transport-ui
          path: transports/bifrost-http/ui

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'

      - name: Build executable
        env:
          LOCAL_WORKSPACE_BUILD: "true"
        run: bash ./.github/workflows/scripts/build-executables.sh "${{ needs.prepare.outputs.fork_version }}" "${{ matrix.platform }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fork-transport-dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/
          if-no-files-found: error

  release:
    needs: [prepare, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout fork automation branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.workflow_ref }}
          path: _workflow

      - name: Overlay fork maintenance scripts
        run: |
          rm -rf .github/workflows/scripts
          mkdir -p .github/workflows
          cp -R _workflow/.github/workflows/scripts .github/workflows/scripts

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: fork-transport-dist-*
          path: _artifacts

      - name: Merge build artifacts
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist
          for artifact_dir in _artifacts/*; do
            cp -R "$artifact_dir"/. dist/
          done

      - name: Package release assets
        run: bash ./.github/workflows/scripts/package-bifrost-http-release-assets.sh "${{ needs.prepare.outputs.fork_version }}"

      - name: Finalize fork transport release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TRANSPORT_TAG_NAME: ${{ needs.prepare.outputs.fork_tag }}
          UPSTREAM_REPO_SLUG: ${{ needs.prepare.outputs.upstream_repo }}
          UPSTREAM_SOURCE_TAG: ${{ needs.prepare.outputs.upstream_tag }}
          SKIP_GIT_TAG_CREATE: "true"
          ALLOW_SAME_CHANGELOG: "true"
          DOCKER_IMAGE_REFERENCE: ${{ needs.prepare.outputs.ghcr_image_ref }}
          RELEASE_ASSET_DIR: release-assets
          RELEASE_TITLE_OVERRIDE: Fork Bifrost HTTP ${{ needs.prepare.outputs.fork_version }}
        run: bash ./.github/workflows/scripts/release-bifrost-http-finalize.sh "${{ needs.prepare.outputs.fork_version }}"
