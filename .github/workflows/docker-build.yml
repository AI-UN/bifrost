name: Build OSS Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in format vX.Y.Z (example: v1.2.3)"
        required: true
        type: string

concurrency:
  group: fork-ghcr-docker-build
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
    steps:
      - name: Validate and derive version tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [[ ! "${INPUT_VERSION}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Invalid version: ${INPUT_VERSION}. Expected format: vX.Y.Z"
            exit 1
          fi

          BASE_VERSION="${BASH_REMATCH[1]}"
          OSS_TAG="v${BASE_VERSION}-oss"
          BUILD_VERSION="${BASE_VERSION}-oss"
          OWNER_LOWER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REPO_LOWER="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE_REPO="${{ env.REGISTRY }}/${OWNER_LOWER}/${REPO_LOWER}"

          echo "oss_tag=${OSS_TAG}" >> "$GITHUB_OUTPUT"
          echo "build_version=${BUILD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"

      - name: Checkout default branch (latest)
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./transports/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ steps.vars.outputs.build_version }}
          tags: |
            ${{ steps.vars.outputs.image_repo }}:${{ steps.vars.outputs.oss_tag }}
