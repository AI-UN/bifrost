name: Build OSS Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in format vX.Y.Z (example: v1.2.3)"
        required: true
        type: string

concurrency:
  group: fork-ghcr-docker-build
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-24.04
    env:
      REGISTRY: ghcr.io
    outputs:
      oss_tag: ${{ steps.vars.outputs.oss_tag }}
      build_version: ${{ steps.vars.outputs.build_version }}
      image_repo: ${{ steps.vars.outputs.image_repo }}
    steps:
      - name: Validate and derive version tags
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [[ ! "${INPUT_VERSION}" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Invalid version: ${INPUT_VERSION}. Expected format: vX.Y.Z"
            exit 1
          fi

          BASE_VERSION="${BASH_REMATCH[1]}"
          OSS_TAG="v${BASE_VERSION}-oss"
          BUILD_VERSION="${BASE_VERSION}-oss"
          OWNER_LOWER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REPO_LOWER="$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE_REPO="${{ env.REGISTRY }}/${OWNER_LOWER}/${REPO_LOWER}"

          echo "oss_tag=${OSS_TAG}" >> "$GITHUB_OUTPUT"
          echo "build_version=${BUILD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"

  build-amd64:
    needs: [prepare]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout default branch (latest)
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push linux/amd64 by digest
        id: build
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./transports/Dockerfile.local
          push: true
          platforms: linux/amd64
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          build-args: |
            VERSION=${{ needs.prepare.outputs.build_version }}
          tags: ${{ needs.prepare.outputs.image_repo }}

      - name: Export digest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-amd64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  build-arm64:
    needs: [prepare]
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout default branch (latest)
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push linux/arm64 by digest
        id: build
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: ./transports/Dockerfile.local
          push: true
          platforms: linux/arm64
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          build-args: |
            VERSION=${{ needs.prepare.outputs.build_version }}
          tags: ${{ needs.prepare.outputs.image_repo }}

      - name: Export digest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-arm64
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-manifest:
    needs: [prepare, build-amd64, build-arm64]
    runs-on: ubuntu-24.04
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        shell: bash
        run: |
          set -euo pipefail
          image_repo="${{ needs.prepare.outputs.image_repo }}"
          oss_tag="${{ needs.prepare.outputs.oss_tag }}"
          refs=()
          for f in /tmp/digests/*; do
            refs+=("${image_repo}@sha256:$(basename "$f")")
          done
          docker buildx imagetools create \
            --tag "${image_repo}:${oss_tag}" \
            "${refs[@]}"
